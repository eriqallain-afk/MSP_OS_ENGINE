# ════════════════════════════════════════════════════════════════
# RÈGLES POUR LA FACTORY
# ════════════════════════════════════════════════════════════════
factory_rules:

  before_creating_agent:
    - Vérifier que l'id n'existe pas dans agents[] ci-dessus
    - Vérifier que les intents ne sont pas dans intents_covered[]
    - Si intent déjà couvert → enrichir l'agent existant, ne pas créer un doublon
    - Prioriser intents_gaps[] pour les nouveaux agents
    - Tout nouvel agent doit avoir completeness >= 90% à la livraison

  required_agent_package:
    mandatory:
      - agent.yaml          # Métadonnées agent (actor_id, team, role, intents)
      - prompt.md           # Prompt système complet
      - contract.yaml       # Contrat (inputs, outputs, SLA, comportements)
      - README.md           # Documentation utilisateur
    recommended:
      - tests.yaml          # Tests de validation
      - examples.yaml       # Exemples d'usage
      - 05_KNOWLEDGE/       # Fichiers de connaissance spécifiques

  naming_convention:
    metier_prefix: IT-
    metier_team_id: TEAM__IT
    ops_prefix: IT-OPS-
    ops_team_id: TEAM__IT_OPS
    forbidden_team: TEAM__OPS   # Utiliser TEAM__IT_OPS à la place
    ops_path_prefix: 20_Agents/IT-OPS-
    metier_path_prefix: 20_Agents/IT-

  quality_standards:
    min_prompt_lines: 50        # Prompt.md minimum 50 lignes
    min_completeness: 90%       # Score completeness minimum livraison
    required_sla_defined: true  # SLA doit être défini dans contract.yaml
    bilingual_support: [fr, en] # Support FR et EN obligatoire

  delivery:
    destination: 99_STAGING/INCOMING/
    format: agent_package
    status_on_delivery: staging
    activation_requires: manual_validation_by_EA

  when_adding_to_playbook:
    - Vérifier que le playbook_id existe dans playbooks[] ci-dessus
    - Proposer l'étape et l'ordre dans le livrable YAML
    - Ne pas modifier playbooks.yaml directement (EA valide)

  forbidden:
    - Créer un agent avec team_id TEAM__OPS (utiliser TEAM__IT_OPS)
    - Nommer un agent OPS- au lieu de IT-OPS-
    - Pointer le fallback vers HUB-AgentMO ou FACTORY
    - Modifier hub_routing.yaml directement
    - Modifier les agents OPS existants sans validation EA
    - Créer un doublon d'intent déjà couvert dans intents_covered[]
    - Activer un agent sans validation EA (auto_activation=false)

