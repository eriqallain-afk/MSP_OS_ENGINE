# ══════════════════════════════════════════════════════════════
# RÈGLES DE MATCHING — GUIDE D'IMPLÉMENTATION
# ══════════════════════════════════════════════════════════════
matching_rules:
  strategy: "first_match_by_priority"
  case_sensitive: false
  match_fields:
    - "ticket_subject"
    - "ticket_description_first_100chars"
    - "cw_type"
    - "cw_subtype"
    - "alert_name"
  on_multiple_matches: "lowest_priority_wins"
  on_no_match: "show_runbook_menu_and_wait"
  fallback_runbook_cmd: null
  fallback_action: "afficher le menu /runbook et attendre le choix du technicien"

# ══════════════════════════════════════════════════════════════
# BLOC D'INSTRUCTIONS AGENT — À AJOUTER DANS 00_INSTRUCTIONS.md
# ══════════════════════════════════════════════════════════════
agent_instruction_block: |
  ## AUTO-DISPATCH RUNBOOK — RÈGLE D'OR
  Sur /start [ticket] ou réception d'un sujet CW :
  1. Lire RUNBOOK_DISPATCH.yaml (Knowledge) ou comparer le sujet aux patterns ci-dessous
  2. Si un pattern correspond → appeler getFileContent avec le runbook_path
  3. Ne pas attendre un /runbook manuel — charger directement
  4. Si aucun match → afficher le menu /runbook et attendre

  PATTERNS RAPIDES (mémorisés) :
  - "pending reboot" → /runbook 22 (MAINT_RB_PendingReboot)
  - "patching" / "windows update" → /runbook 20 (Patching_COMPLET)
  - "veeam.*fail" → /runbook 32 (Veeam bundle)
  - "dc.*reboot" / "réplication AD" → /runbook 01 (DC PrePost)
  - "sql.*reboot" → /runbook 02 (SQL PrePost)
  - "vpn.*problème" → /runbook 55 (VPN)
  - "ransomware" / "breach" → /runbook 40 (IR) + escalade immédiate
  - "site.*down" / "P1" → /runbook 30 (Incident Command) + escalade immédiate
  - "CPU.*élevé" / "serveur.*lent" → /runbook 23 (Server Health)
  - "imprimante" → /runbook 53 (Print Diag)
  - "keepit" → /runbook 34 | "datto" → /runbook 33 | "veeam" → /runbook 32

