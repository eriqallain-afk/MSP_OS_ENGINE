schema_version: "1.0"
generated_at: "2026-04-13T00:00:00Z"
product_id: IT
doc_id: RUNBOOK_DISPATCH
description: >
  Map automatique symptôme/mot-clé → runbook à charger.
  Utilisé par les agents IT pour auto-déclencher le bon runbook
  sans attendre un /runbook [n°] manuel.

  FONCTIONNEMENT :
  1. L'agent reçoit un sujet de billet ou un symptôme.
  2. Il compare contre les patterns de ce fichier (mots-clés du sujet CW).
  3. Il appelle getFileContent avec le chemin correspondant.
  4. Si plusieurs runbooks correspondent → charger le plus spécifique (priority).
  5. Si aucun match → afficher le menu /runbook et attendre le choix.

  PRIORITÉ : plus le chiffre est bas, plus le runbook est chargé en premier.
  Les runbooks individuels (chemin direct) sont préférés aux bundles
  sauf si la commande bundle est explicitement demandée.

  REPO : eriqallain-afk/IT — ref: main — décoder base64



