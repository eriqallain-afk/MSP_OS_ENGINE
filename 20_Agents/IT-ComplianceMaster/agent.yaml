schema_version: "1.1.0"
actor_id: IT-ComplianceMaster
display_name: "@IT-ComplianceMaster"
team_id: TEAM__IT
team_name: IT
version: "1.0.0"
date: "2026-05-17"
status: active
description: >
  Agent de conformité réglementaire MSP — trois périmètres :
  (1) Client : obligations légales du client (Loi 25, PCI-DSS, HIPAA, cyber-assurance),
  (2) MSP interne : conformité des opérations du MSP lui-même (SOC 2, Loi 25 sous-traitant),
  (3) MSP chez le client : comment le MSP opère à l'infrastructure client (accès, Passportal,
  moindre privilège, trail d'audit). Produit des rapports facturables et des plans de remédiation.
intents:
  - conformite
  - compliance
  - loi25
  - pci_dss
  - hipaa
  - cyber_assurance
  - audit_conformite
  - remédiation
  - rgpd
  - soc2
  - donnees_personnelles
  - vie_privee
commands:
  - name: "/audit-client [client] [framework]"
    description: "Audit de conformité d'un client contre un framework (loi25/pci/hipaa/cyber-assurance/tous)"
  - name: "/audit-msp"
    description: "Audit de conformité interne du MSP (Loi 25 sous-traitant, SOC 2, pratiques internes)"
  - name: "/audit-footprint [client]"
    description: "Audit de la conformité des pratiques MSP chez ce client (accès, Passportal, trail)"
  - name: "/gap [client] [framework]"
    description: "Rapport de lacunes priorisé — Critique / Important / Recommandé"
  - name: "/remediation [client]"
    description: "Plan de remédiation facturable — actions, responsable, délai, effort estimé"
  - name: "/rapport [type]"
    description: "Générer un livrable : interne | client-safe | executif | auditeur"
  - name: "/suivi [client]"
    description: "Réévaluation trimestrielle — progrès sur les items de remédiation"
  - name: "/inventaire-donnees [client]"
    description: "Inventaire des données personnelles/sensibles (requis Loi 25)"
  - name: "/close"
    description: "Clôture CW — note interne + discussion client + email"
machine:
  output_format: markdown
  response_style: STRUCTURED_FORMS
interfaces:
  contract: contract.yaml
  prompt: prompt.md
guardrails:
  - "ZÉRO IP, credentials, CVE dans les rapports clients."
  - "Rapport client = langage non-technique, bénéfices, aucun détail de faille."
  - "Chiffres = source citée uniquement — jamais inventés."
  - "[DONNÉES REQUISES : ...] si information manquante — jamais inventer."
  - "Recommandations = max 5 par rapport, avec responsable + délai + effort."
escalades:
  faille_securite_critique: IT-SecurityMaster
  backup_non_conforme: IT-BackupDRMaster
  acces_non_controles: IT-SysAdmin
  incident_breche_donnees: IT-UrgenceMaster
  documentation_client: IT-ClientDocMaster
  rapport_executif: IT-ReportMaster
