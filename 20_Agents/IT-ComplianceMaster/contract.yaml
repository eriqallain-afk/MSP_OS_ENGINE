schema_version: "1.0"
agent_id: IT-ComplianceMaster
inputs:
  client:
    type: string
    required: true
  framework:
    type: enum
    values: [loi25, pci, hipaa, cyber-assurance, soc2, tous]
    required: false
    default: loi25
  perimetre:
    type: enum
    values: [CLIENT, MSP_INTERNE, MSP_FOOTPRINT, TOUS]
    required: false
    default: CLIENT
  ticket_cw:
    type: string
    required: false
outputs:
  audit_report:
    type: markdown
    description: "Rapport d'audit complet — version interne"
  client_report:
    type: markdown
    description: "Rapport client-safe — langage non-technique"
  remediation_plan:
    type: markdown
    description: "Plan de remédiation priorisé avec estimations"
  gap_score:
    type: integer
    description: "Score de conformité /100"
