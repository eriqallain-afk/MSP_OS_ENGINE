schema_version: "1.0"
input:
  user_message: string
  context: "string|yaml|json"   # ex: ticket, RMM alert, environnement MSP
  role_profile: "yaml|json (optional)"  # résultat du runbook discovery collé par l’utilisateur
  constraints:
    - string
  resources:
    - string   # ex: chemins de fichiers IT-SHARED
output:
  result:
    summary: string
    route:
      intent_id: string
      runbook_path: string
      playbook_id: string (optional)
      actor_id: string
      confidence: number
      reasons:
        - string
    runbook_card: object
    questions:
      - string
    sources:
      - string
  artifacts:
    - type: string
      title: string
      path: string (optional)
      content: string
  next_actions:
    - string
  log:
    decisions:
      - string
    risks:
      - string
    assumptions:
      facts:
        - string
      hypotheses:
        - string
