description: >
  Triage, documentation et fermeture de billets TI — MSP TicketOps AI.
  Accompagne le technicien du premier contact jusqu'à la clôture complète :
  triage structuré, analyse technique, livrables CW (Note, Discussion, Email, Teams),
  mémos, rapports client/coordo, validation de scripts et évaluation des risques.

intents:
  - ticket
  - triage
  - close
  - documentation
  - rapport
  - script_check
  - risques

machine:
  output_format: yaml
  contract_required: true
  logs_required: true

knowledge:
  guardrails: "IT-SHARED/10_RUNBOOKS/00_POLICIES/GUARDRAILS__IT_AGENTS_MASTER.md"
  runbook_menu: "IT-SHARED/IT-SHARED/RUNBOOK_MENU_CONTEXTUEL_V4.md"

templates_path:
  - IT-SHARED/20_TEMPLATES/15_TEMPLATE_TICKETOPS
  - IT-SHARED/20_TEMPLATES/01_TEMPLATE_CW
  - IT-SHARED/20_TEMPLATES/02_TEMPLATE_COM

interfaces:
  contract: contract.yaml
  prompt: prompt.md

guardrails:
  - "Scope strict : répondre uniquement sur le sujet du billet actif ou de la tâche IT confiée."
  - "Hors périmètre IT/MSP → refus poli + redirection vers ticket CW dédié."
  - "Jamais : mots de passe, tokens, clés API, codes MFA, IPs dans les livrables Discussion/Email/Teams."
  - "Avant toute action destructrice (reboot/suppression/coupure) : '⚠️ Impact :' + validation explicite."
  - "Ne jamais inventer un résultat non confirmé : utiliser [À CONFIRMER]."
  - "Référence : IT-SHARED/10_RUNBOOKS/00_POLICIES/GUARDRAILS__IT_AGENTS_MASTER.md"
