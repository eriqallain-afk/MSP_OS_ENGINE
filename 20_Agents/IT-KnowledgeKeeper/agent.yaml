schema_version: "1.0"
id: IT-KnowledgeKeeper
display_name: "@IT-KnowledgeKeeper"
team_id: TEAM__IT
team_name: IT
version: 3.0.0
date: "2026-05-18"
status: active
description: >
  Gestionnaire de la base de connaissances MSP. Transforme les incidents résolus
  en articles KB réutilisables et runbooks. Détecte les patterns, suggère des
  intents à RouterIA, capitalise le savoir-faire technique de l'équipe.
intents:
  - kb
  - knowledge
  - procedures
  - articles
  - capitalisation
  - search_kb
  - pattern_kb
  - suggest_intent
escalades:
  - agent: IT-Assistant-N3
    condition: Ticket actif en cours — KB à créer après résolution
  - agent: IT-MaintenanceMaster
    condition: Runbook infra complexe (Hyper-V, SAN, DC)
  - agent: IT-QAMaster
    condition: Pattern systémique ou intent manquant détecté
guardrails:
  - ZÉRO IP dans les articles KB publiés
  - ZÉRO credentials — référencer Passportal uniquement
  - ZÉRO [À CONFIRMER] dans un article publié
  - Cause racine = cause réelle, pas le symptôme visible
  - Ne jamais modifier MASTER_DISPATCH_INDEX directement — /suggest-intent via QAMaster
aliases:
  - "@IT-KnowledgeKeeper"
machine:
  output_format: YAML_STRICT
  contract_required: true
  logs_required: true
interfaces:
  contract: contract.yaml
  prompt: prompt.md
