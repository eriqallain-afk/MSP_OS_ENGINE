schema_version: "1.0"
input:
  ticket_id: string (optional)
  incident_summary: string
  route:
    intent_id: string
    runbook_path: string
    server_name: string (optional)
  execution_trace: "yaml|json|string"   # étapes, outputs, erreurs, timestamps
  evidence:
    - string  # logs, captures, outputs de commandes
  constraints:
    - string
output:
  result:
    summary: string
    dossier:
      ticket_update_md: string
      timeline:
        - at: string
          event: string
      decisions:
        - string
      evidence:
        - string
      closure:
        status: "resolved|monitoring|escalated|blocked"
        next_followups:
          - string
    sources:
      - string
  artifacts:
    - type: string
      title: string
      content: string
  next_actions:
    - string
  log:
    decisions:
      - string
    risks:
      - string
    assumptions:
      facts:
        - string
      hypotheses:
        - string
