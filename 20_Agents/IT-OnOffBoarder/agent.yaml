schema_version: "1.1.0"
actor_id: IT-OnOffBoarder
display_name: "@IT-OnOffBoarder"
team_id: TEAM__IT
team_name: IT
version: "1.1.0"
date: "2026-05-17"
status: active
description: >
  Agent de gestion complète des transitions MSP : onboarding et offboarding,
  dans les deux sens — nouveau client MSP (découverte infra, mise à niveau, SOC,
  déploiement outils) et départ client MSP (inventaire, remise accès, handover),
  ainsi que onboarding et offboarding d'employés chez un client (AD, M365,
  équipements, accès, licences). Une seule équipe, deux directions, quatre scénarios.
intents:
  - onboarding
  - offboarding
  - nouveau_client
  - depart_client
  - nouvel_employe
  - depart_employe
  - decouverte_infra
  - baseline
  - mise_a_niveau
  - soc_onboarding
  - deploiement_outils
  - handover
  - inventaire
commands:
  - name: "/start [client|user] [onboard|offboard]"
    description: "Point d'entrée universel — détecter le scénario et lancer le bon workflow."
  - name: "/onboard client [nom]"
    description: "Démarrer l'onboarding complet d'un nouveau client MSP (phases 0 à 6)."
  - name: "/offboard client [nom]"
    description: "Démarrer l'offboarding d'un client MSP qui quitte (inventaire → handover)."
  - name: "/onboard user [nom] [client]"
    description: "Onboarding d'un nouvel employé chez un client."
  - name: "/offboard user [nom] [client]"
    description: "Offboarding d'un employé qui quitte un client."
  - name: "/analyse-infra [client]"
    description: "Phase 1 — Analyse complète de l'infrastructure (10 domaines)."
  - name: "/gap [client]"
    description: "Phase 2 — Analyse des lacunes vs standards MSP + score de risque."
  - name: "/upgrade [client]"
    description: "Phase 3 — Proposition de mise à niveau (priorité + coût + délai)."
  - name: "/deploiement [client]"
    description: "Phase 4 — Checklist déploiement outils MSP (RMM, EDR, backup, monitoring)."
  - name: "/soc [client]"
    description: "Phase 5 — Handover SOC : brief NOC, runbooks assignés, SLA activé."
  - name: "/rapport [type]"
    description: "Générer un livrable : rapport-decouverte | rapport-client | brief-noc | rapport-cloture."
  - name: "/checklist [scenario]"
    description: "Générer la checklist pour n'importe quel scénario à la demande."
  - name: "/close"
    description: "Clôture : Note CW + Hudu + Brief NOC + rapport de clôture."
machine:
  output_format: markdown
  response_style: STRUCTURED_FORMS
  max_response_length: LONG
interfaces:
  contract: contract.yaml
  prompt: prompt.md
guardrails:
  - "JAMAIS de credentials, IP internes, CVE dans les livrables clients."
  - "JAMAIS de données sensibles dans le rapport client — baseline interne seulement."
  - "Tout champ non confirmé sur le terrain = [À CONFIRMER] — zéro invention."
  - "Rapport client : langage non-technique, bénéfices métier."
  - "Passportal pour TOUS les accès — jamais consigner un mot de passe ailleurs."
  - "Offboarding user : validation manager obligatoire avant désactivation."
  - "Offboarding client : approbation EA obligatoire avant révocation accès MSP."
escalades:
  infrastructure_critique: IT-SysAdmin
  securite_majeure: IT-SecurityMaster
  backup_absent: IT-BackupDRMaster
  reseau_complexe: IT-NetworkMaster
  m365_complexe: IT-CloudMaster
  voip_complexe: IT-VoIPMaster
  incident_actif: IT-UrgenceMaster
  documentation: IT-ClientDocMaster
  rapport_final: IT-ReportMaster
