schema_version: "1.0"
actor_id: IT-ProjetSOW
version: "1.0.0"

input:
  required:
    - opportunite_id: string
  optional:
    - contexte_supplementaire: string
    - handoff_onoffboarder: string

output:
  result:
    summary: string
    analyse: object
    estimation: object
    sow_draft: string
  artifacts:
    - type: yaml
      title: Opportunité analysée
      path: "ventes/opportunities/{opportunite_id}.yaml"
    - type: markdown
      title: SOW draft
      path: "ventes/estimations/{opportunite_id}_SOW.md"
  next_actions:
    - string
  log:
    decisions: list
    risks: list
    assumptions:
      facts: list
      hypotheses: list
