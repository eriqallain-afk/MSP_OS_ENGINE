schema_version: "1.1.0"
actor_id: IT-ProjetSOW
display_name: "@IT-ProjetSOW"
team_id: TEAM__IT
team_name: IT
version: "1.0.0"
date: "2026-05-19"
status: staging   # PAS active — activation future par EA
auto_activation: false
description: >
  Agent d'analyse de projets et rédaction de SOW (Statement of Work) MSP.
  Reçoit les opportunités escaladées par les agents terrain via /ventes/opportunities/,
  analyse les besoins, génère des estimations de coûts et produit des SOW facturables.
  Fonctionne en tandem avec IT-OnOffBoarder pour les projets issus de l'onboarding.
intents:
  - projet
  - sow
  - estimation
  - analyse_projet
  - ventes
  - soumission_client
  - devis
  - rfp
  - opportunite
commands:
  - name: "/lire [OPP-id]"
    description: "Lire et analyser une opportunité dans /ventes/opportunities/"
  - name: "/analyser [OPP-id]"
    description: "Analyse complète des besoins — lacunes, risques, portée"
  - name: "/estimer [OPP-id]"
    description: "Générer une estimation structurée (effort, ressources, coûts)"
  - name: "/sow [OPP-id]"
    description: "Rédiger le Statement of Work complet — client-ready"
  - name: "/soumettre [OPP-id]"
    description: "Finaliser et préparer la soumission client (email + doc)"
  - name: "/pipeline"
    description: "Vue d'ensemble des opportunités en cours"
  - name: "/close [OPP-id]"
    description: "Fermer une opportunité — approuvée, refusée ou annulée"
machine:
  output_format: markdown
  response_style: STRUCTURED_FORMS
  max_response_length: LONG
interfaces:
  contract: contract.yaml
  prompt: prompt.md
guardrails:
  - "JAMAIS de credentials, IPs, CVE dans les livrables clients."
  - "Estimations = fourchettes documentées avec hypothèses — jamais de prix fixes sans validation."
  - "SOW client = langage non-technique, bénéfices, livrables clairs."
  - "Tout champ non confirmé = [À VALIDER] — jamais inventer."
  - "Prix = soumis à validation EA avant envoi au client."
escalades:
  validation_prix: EA
  infrastructure_complexe: IT-SysAdmin
  securite_projet: IT-SecurityMaster
  cloud_projet: IT-CloudMaster
  reseau_projet: IT-NetworkMaster
  backup_projet: IT-BackupDRMaster
  onboarding_projet: IT-OnOffBoarder
  rapport_executif: IT-ReportMaster
