# Source de vérité pour le module Risk Engine — produit IT
# Validation EA obligatoire avant activation

schema_version: 2.2.0
document_id: FACTORY_MANIFEST_MODULE_RISK_ENGINE
status: staging
created_at: '2026-05-25'
last_reviewed_at: '2026-05-25'
auto_activation: false

# ─────────────────────────────────────────────
# IDENTITÉ DU MODULE
# ─────────────────────────────────────────────
module:
  id: MODULE_RISK_ENGINE
  display_name: Risk Intelligence Engine
  version: 1.0.0
  prefix: IT
  parent_product: MSP Intelligence AI
  parent_repo: eriqallain-afk/IT
  staging_repo: eriqallain-afk/msp_os_engine
  domain: gouvernance_strategique_msp
  classification: module_additionnel
  extraction_ready: true

  description: >
    Module de classification et de scoring du risque infrastructurel.
    S'intègre au produit IT existant comme couche stratégique au-dessus
    des agents opérationnels. Produit un Risk Intelligence Report structuré
    (scores, détections, plan d'action) à partir des données infra client.
    Conçu pour être extrait en produit autonome (MSP_OS_ENGINE) quand
    la validation marché le justifie.

  value_proposition: >
    Les agents IT opérationnels (SysAdmin, SecurityMaster, BackupDRMaster,
    ComplianceMaster, MaintenanceMaster) accumulent une connaissance fine
    de l'infrastructure client. Le Risk Engine synthétise cette connaissance
    en un verdict structuré — Risk Score, Governance Score, Continuity Score —
    lisible par un directeur MSP ou présentable à un client.

# ─────────────────────────────────────────────
# AGENTS DU MODULE (5)
# ─────────────────────────────────────────────
agents:

  - agent_id: IT-RiskScorer
    display_name: Risk Scorer
    priority: P1
    role: orchestrateur_module
    description: >
      Point d'entrée du module. Reçoit les données infra (CSV, export RMM,
      ou réponses des agents IT). Orchestre les 4 agents analystes.
      Agrège les scores partiels en score global pondéré.
      Produit le verdict final : Risk Index + classification.
    inputs:
      - infra_data: données infrastructure client (format structuré)
      - client_name: identifiant client
      - analysis_mode: [full | quick | targeted]
    outputs:
      - risk_index_global: score 0-100
      - classification: [CRITICAL | HIGH | MODERATE | LOW]
      - pillar_scores: objet avec 5 scores détaillés
      - detections: liste des anomalies détectées
    dependencies_from_it_agents:
      - IT-SysAdmin
      - IT-SecurityMaster
      - IT-BackupDRMaster
      - IT-ComplianceMaster
      - IT-MaintenanceMaster
    files_to_produce:
      - agent.yaml
      - contract.yaml
      - prompt.md
      - GPT_SETUP_CARD__IT-RiskScorer_v1.md

  - agent_id: IT-GovernanceAnalyst
    display_name: Governance Analyst
    priority: P1
    role: specialiste
    pillar: governance_integrity
    description: >
      Évalue la cohérence des contrôles de gouvernance IT.
      Détecte les violations Tier-0, les écarts de segmentation,
      les incohérences de criticité vs redondance.
      Produit le Governance Score (0-100) et la liste des violations.
    detects:
      - Tier-0 violations (VM critiques sur hyperviseur non redondant)
      - Absence de segmentation VLAN
      - Comptes Admin sans MFA
      - Politique de mot de passe non conforme
      - Accès tiers non tracés
    inputs_from: IT-ComplianceMaster, IT-SysAdmin
    files_to_produce:
      - agent.yaml
      - contract.yaml
      - prompt.md
      - GPT_SETUP_CARD__IT-GovernanceAnalyst_v1.md

  - agent_id: IT-ContinuityValidator
    display_name: Continuity Validator
    priority: P1
    role: specialiste
    pillar: continuity_assurance
    description: >
      Valide la couverture de continuité d'affaires.
      Identifie les SPOF, les gaps de validation backup,
      les dépendances non protégées.
      Produit le Continuity Score (0-100).
    detects:
      - Backup non testé ou non validé (>30 jours)
      - SPOF sur composants critiques (DC unique, SAN unique)
      - Absence de plan DR documenté
      - RTO/RPO non définis pour services critiques
      - Backup positionné sur même site que production
    inputs_from: IT-BackupDRMaster, IT-SysAdmin
    files_to_produce:
      - agent.yaml
      - contract.yaml
      - prompt.md
      - GPT_SETUP_CARD__IT-ContinuityValidator_v1.md

  - agent_id: IT-ExposureMapper
    display_name: Exposure Mapper
    priority: P2
    role: specialiste
    pillar: exposure_surface
    description: >
      Cartographie la surface d'exposition périmétrique et interne.
      Quantifie le risque d'exposition réseau, d'accès non contrôlé
      et de dérive de configuration sécurité.
      Produit l'Exposure Score (0-100).
    detects:
      - Ports d'administration exposés sur WAN (RDP, SSH, RPC)
      - Absence de MFA sur accès critiques
      - EDR absent ou non à jour sur endpoints
      - Firmware équipements réseau EOL ou non patché
      - Comptes de service avec permissions excessives
    inputs_from: IT-SecurityMaster, IT-NetworkMaster
    files_to_produce:
      - agent.yaml
      - contract.yaml
      - prompt.md
      - GPT_SETUP_CARD__IT-ExposureMapper_v1.md

  - agent_id: IT-ExecutiveReporter
    display_name: Executive Reporter
    priority: P1
    role: output_generator
    description: >
      Transforme les scores et détections bruts en rapport lisible.
      Produit le Risk Intelligence Report complet :
      scores visuels, détections classifiées, plan d'action 30/60/90.
      Format : CW_NOTE interne + livrable PDF client.
    outputs_produced:
      - risk_intelligence_report_internal: CW_NOTE structurée
      - risk_intelligence_report_client: document exécutif (français/anglais)
      - action_plan_30_60_90: plan priorisé avec justifications
      - cw_discussion_summary: résumé discussion ConnectWise
    inputs_from: IT-RiskScorer (scores + détections agrégés)
    files_to_produce:
      - agent.yaml
      - contract.yaml
      - prompt.md
      - GPT_SETUP_CARD__IT-ExecutiveReporter_v1.md
      - TEMPLATE_RISK_INTELLIGENCE_REPORT_v1.md

# ─────────────────────────────────────────────
# PLAYBOOK DU MODULE (1)
# ─────────────────────────────────────────────
playbooks:

  - playbook_id: IT_RISK_ASSESSMENT
    display_name: Risk Assessment — Client Infrastructure
    trigger: manual | scheduled_quarterly | post_onboarding
    estimated_duration_minutes: 30
    description: >
      Exécute une évaluation complète du risque infrastructurel
      pour un client MSP. Collecte les données, calcule les 5 scores,
      détecte les anomalies, génère le rapport exécutif.
    steps:
      - S1: IT-RiskScorer — réception et validation des données infra
      - S2: IT-GovernanceAnalyst — analyse gouvernance (parallèle S3/S4)
      - S3: IT-ContinuityValidator — analyse continuité (parallèle S2/S4)
      - S4: IT-ExposureMapper — analyse exposition (parallèle S2/S3)
      - S5: IT-RiskScorer — agrégation scores partiels + calcul global
      - S6: IT-ExecutiveReporter — génération rapport + plan d'action
      - S7: IT-OPS-DossierIA — archivage run + livrables
    outputs:
      - risk_intelligence_report
      - action_plan_30_60_90
      - cw_note_interne

# ─────────────────────────────────────────────
# SCORING MODEL (référence)
# ─────────────────────────────────────────────
scoring_model_ref: SCORING_MODEL_V1.yaml

# ─────────────────────────────────────────────
# DÉPENDANCES AGENTS IT EXISTANTS
# ─────────────────────────────────────────────
dependencies:
  reads_from:
    - IT-SysAdmin        # Lifecycle Risk — EOL, versioning, hyperviseur
    - IT-SecurityMaster  # Exposure Surface — EDR, incidents, périmètre
    - IT-BackupDRMaster  # Continuity Assurance — backup, DR, SPOF
    - IT-ComplianceMaster # Governance Integrity — conformité, contrôles
    - IT-MaintenanceMaster # Operational Drift — patch, config drift
  routes_through:
    - IT-OPS-RouterIA    # Point d'entrée standard du produit IT
  archives_via:
    - IT-OPS-DossierIA   # Traçabilité et archivage des runs

# ─────────────────────────────────────────────
# STRUCTURE FICHIERS À CRÉER
# ─────────────────────────────────────────────
files_structure:
  module_root: 20_Agents/MODULE_RISK_ENGINE/
  agents:
    - 20_Agents/MODULE_RISK_ENGINE/IT-RiskScorer/
    - 20_Agents/MODULE_RISK_ENGINE/IT-GovernanceAnalyst/
    - 20_Agents/MODULE_RISK_ENGINE/IT-ContinuityValidator/
    - 20_Agents/MODULE_RISK_ENGINE/IT-ExposureMapper/
    - 20_Agents/MODULE_RISK_ENGINE/IT-ExecutiveReporter/
  playbook: playbooks/IT_RISK_ASSESSMENT.yaml
  templates: IT-SHARED/20_TEMPLATES/TEMPLATE_RISK_INTELLIGENCE_REPORT_v1.md
  scoring_model: IT-SHARED/50_REFERENCE/SCORING_MODEL_RISK_ENGINE_V1.yaml

# ─────────────────────────────────────────────
# WORKFLOW DE PRODUCTION FACTORY
# ─────────────────────────────────────────────
production_workflow:
  phase_1_brief:
    status: done
    deliverables:
      - manifest: FACTORY_MANIFEST_MODULE_RISK_ENGINE.yaml
      - scoring_model: SCORING_MODEL_V1.yaml

  phase_2_conception:
    status: pending_ea_validation
    deliverables:
      - profil complet IT-RiskScorer
      - profil complet IT-GovernanceAnalyst
      - profil complet IT-ContinuityValidator
      - profil complet IT-ExposureMapper
      - profil complet IT-ExecutiveReporter
      - architecture playbook IT_RISK_ASSESSMENT

  phase_3_production:
    status: not_started
    deliverables:
      - prompt.md complet pour chaque agent
      - contract.yaml pour chaque agent
      - GPT_SETUP_CARD pour chaque agent
      - TEMPLATE_RISK_INTELLIGENCE_REPORT_v1.md

  phase_4_validation:
    status: not_started
    gate: staging_99

  phase_5_activation:
    status: not_started
    gate: ea_manual_validation

# ─────────────────────────────────────────────
# CRITÈRES DE SUCCÈS PHASE A
# ─────────────────────────────────────────────
success_criteria_phase_a:
  - IT-RiskScorer produit un score global cohérent depuis données CSV simple
  - IT-ExecutiveReporter génère un rapport lisible par un directeur non-technique
  - Le playbook IT_RISK_ASSESSMENT tourne de bout en bout sur un cas réel
  - Un technicien MSP peut lancer une évaluation en < 15 minutes
  - Le rapport produit peut être présenté au client comme livrable facturable

# ─────────────────────────────────────────────
# NOTES EA
# ─────────────────────────────────────────────
notes:
  extraction_path: >
    Si validation marché positive (clients demandent le rapport sans le produit IT complet),
    le module s'extrait dans MSP_OS_ENGINE comme produit autonome.
    Les 5 agents reçoivent alors leur propre prefix (MSP-) et leur propre routeur.
  pricing_signal: >
    Signal d'extraction : un prospect demande 'juste le rapport de risque'
    sans vouloir l'abonnement IT complet. À ce moment, extraire.
  human_owner: Eric Allain (EA)
  machine_owner: IT-OPS-DossierIA
