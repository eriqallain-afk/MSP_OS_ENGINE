# HANDOFF_SCHEMA.yaml — Schéma de passation inter-agents IT-TicketOpsAI
# Généré par : IT-MaintenanceMaster | IT-SysAdmin (via /handoff)
# Consommé par : IT-TicketOpsAI (via /start #XXXXX)
# Chemin de dépôt : 99_STAGING/BILLETS/{NUMERO_BILLET}/handoff.yaml
# Version : 1.0 — 2026-05-08

schema_version: "1.0"
agent_source: "[IT-MaintenanceMaster | IT-SysAdmin | Autre]"
statut: "ready_for_close"   # ready_for_close | in_progress | escalated

# ── IDENTIFICATION ────────────────────────────────────────────────
billet: "#[XXXXX]"
client: "[NOM CLIENT]"
date: "[YYYY-MM-DD]"
heure_debut: "[HH:MM]"
heure_fin: "[HH:MM]"
duree_minutes: 0
technicien: "[NOM TECHNICIEN]"

# ── CONTEXTE INTERVENTION ─────────────────────────────────────────
type_intervention: "[patching | snapshot | backup | reboot | disque | dns_dhcp | rds | windows_update | postcheck | autre]"
template_suggere: "[CLOSE_Patching | CLOSE_SnapshotVMware | CLOSE_BackupFailed | CLOSE_DisquePlein | CLOSE_DNS-DHCP | CLOSE_RDSLicensing | CLOSE_RebootServeur | CLOSE_WindowsUpdateMissing | CLOSE_Postcheck]"

environnement:
  machines: ["[NOM-MACHINE-1]", "[NOM-MACHINE-2]"]
  os: "[Windows Server XXXX | Windows 11 | Linux]"
  role: "[DC | Serveur de fichiers | RDS | Poste | Autre]"
  scope: "[Production | Test | Dev]"

# ── ACTIONS EFFECTUÉES ────────────────────────────────────────────
actions:
  - etape: 1
    action: "[Description de l'action]"
    resultat: "[OK | Erreur X | À confirmer]"
    timestamp: "[HH:MM]"
  - etape: 2
    action: "[Description de l'action]"
    resultat: "[OK]"
    timestamp: "[HH:MM]"

# ── VALIDATIONS POST-INTERVENTION ────────────────────────────────
postcheck:
  services_critiques: "[OK | Erreur — préciser]"
  event_viewer: "[Aucune erreur critique | Erreur ID XXXX notée]"
  monitoring_rmm: "[Aucune alerte | Alerte X acquittée]"
  connexions_testees: "[Oui — OK | Non]"
  snapshot_supprime: "[Oui | Non — prévu le YYYY-MM-DD | N/A]"

# ── ANOMALIES & RISQUES RÉSIDUELS ────────────────────────────────
anomalies: []
# Exemple :
# - "[Erreur Event ID 1234 notée — non bloquante]"

risques_residuels: []
# Exemple :
# - "[Reboot requis hors-heures — planifié YYYY-MM-DD]"

# ── RECOMMANDATIONS ──────────────────────────────────────────────
recommandations: []
# Exemple :
# - "[Extension disque C: recommandée — seuil critique dans ~30 jours]"

# ── MÉTA ─────────────────────────────────────────────────────────
escalade_requise: false
agent_escalade: null     # Ex: "@IT-BackupDRMaster"
kb_a_creer: false
hudu_a_mettre_a_jour: false
