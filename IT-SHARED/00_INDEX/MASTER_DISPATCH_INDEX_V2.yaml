# MASTER_DISPATCH_INDEX_V2.yaml
# Index central de dispatch — IT-OPS-RouterIA
# Version : 2.0 — 2026-05-09
#
# USAGE :
#   IT-OPS-RouterIA charge cet index au démarrage de session.
#   Pour chaque requête entrante : scanner les `signals` de chaque intent.
#   Retourner les `resources` correspondants à l'agent demandeur.
#
# PRINCIPE :
#   Les intents sont liés aux ressources IT-SHARED (runbooks, templates,
#   scripts, checklists, références) — PAS aux agents.
#   L'agent qui reçoit les ressources décide quoi en faire.
#
# PROPRIÉTAIRE : IT-OPS-RouterIA | repo: eriqallain-afk/IT | ref: main
# REMPLACE     : INTENT_RUNBOOK_MATRIX_V1.md + INTENT_RUNBOOK_ROUTING_MATRIX_V1.md

schema_version: "2.0"
owner: IT-OPS-RouterIA
last_updated: "2026-05-09"

# ─────────────────────────────────────────────────────────────────────────────
# FORMAT PAR INTENT
# ─────────────────────────────────────────────────────────────────────────────
# id          : identifiant unique dot-notation (it.<domaine>.<action>)
# label       : description courte
# risk_level  : low | medium | high | critical
# signals     : mots-clés / phrases déclencheurs (FR + EN, insensible à la casse)
# role_profile_required : true si le rôle serveur doit être connu avant routage
# resources:
#   runbook   : chemin principal IT-SHARED
#   runbook_alt : runbooks alternatifs (optionnel)
#   template  : template de fermeture / communication
#   script    : script PowerShell ou Bash
#   checklist : checklist pré/post
#   reference : document de référence / guide

intents:

